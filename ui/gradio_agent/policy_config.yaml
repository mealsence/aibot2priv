# VLA Policy Configuration
# This file configures which policy to load for execute_vla_task

# Policy path (can be HuggingFace Hub repo or local path)
policy_path: "TInkybala/Real_Panda_ScrewHex_pi0"

# Policy type (act, smolvla, diffusion, etc.)
policy_type: "pi0"

# Device to use for inference (cuda, cpu, or null for auto-detect)
device: "cuda"

# Robot configuration for VLA tasks
robot:
  type: "panda_ros_cartesian"  # panda_ros_position (fast), panda_ros (trajectory)
  id: "my_panda_follower"

# Execution parameters
execution:
  fps: 30  # Control loop frequency (Hz)
  default_num_steps: 500  # Default number of steps (10s at 30 FPS)
