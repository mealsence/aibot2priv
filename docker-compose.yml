services:
  lerobot-ros2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lerobot-humble
    image: lerobot-ros2:humble
    
    # Mount project directory
    volumes:
      - .:/ws:cached
      - /tmp/.X11-unix:/tmp/.X11-unix:rw  # For GUI applications
    
    # Environment
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/tmp/.Xauthority
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
    
    # Network and privileges
    network_mode: host
    privileged: true
    ipc: host
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
