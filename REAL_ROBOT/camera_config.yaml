# RealSense Camera Configuration
#
# This file configures multiple RealSense cameras for real robot data collection.
# Each camera is mapped to a ROS2 topic that the data collection pipeline will use.
#
# To find your camera serial numbers, run:
#   lerobot-find-cameras realsense
#
# Or use the realsense-viewer GUI:
#   realsense-viewer

cameras:
  # Front-facing camera (primary view of workspace)
  camera_1:
    serial: "935422070449"
    topic: "/rgb/camera_1"
    width: 640
    height: 480
    fps: 30
    color_mode: "RGB"  # Options: "RGB" or "BGR"

  # Second camera
  camera_2:
    serial: "829212070728"
    topic: "/rgb/camera_2"
    width: 640
    height: 480
    fps: 30
    color_mode: "RGB"

  # Third camera
  camera_3:
    serial: "831612074257"
    topic: "/rgb/camera_3"
    width: 640
    height: 480
    fps: 30
    color_mode: "RGB"

# Configuration notes:
#
# Resolution options (common RealSense supported resolutions):
#   640x480    (VGA) - Default, good performance
#   1280x720   (720p) - Higher quality, more storage
#   1920x1080  (1080p) - Best quality, most storage
#
# FPS options:
#   15, 30, 60, 90 (depends on camera model and resolution)
#   Higher FPS = smoother video but more CPU/storage usage
#
# Color mode:
#   RGB - Red, Green, Blue (standard for LeRobot datasets)
#   BGR - Blue, Green, Red (OpenCV default, not recommended for datasets)
